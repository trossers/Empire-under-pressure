<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Components · Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:24px 32px;box-sizing:border-box}
  .meta{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;margin-bottom:12px}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:14px;margin-bottom:14px}
  .item{display:flex;flex-direction:column;align-items:center;gap:4px}
  .item i{font-size:22px;color:var(--ink-1)}
  .item span{font-family:var(--font-mono);font-size:8.5px;color:var(--ink-4);text-align:center;line-height:1.2}
  .ornaments{display:flex;justify-content:center;gap:18px;color:var(--gold-3);font-size:18px;font-family:var(--font-serif);margin-top:8px}
</style></head>
<body>
<div class="frame">
  <div class="meta">Phosphor regular · 22px · ink-1</div>
  <div class="grid">
    <div class="item"><i class="ph ph-crown"></i><span>crown</span></div>
    <div class="item"><i class="ph ph-scroll"></i><span>scroll</span></div>
    <div class="item"><i class="ph ph-seal"></i><span>seal</span></div>
    <div class="item"><i class="ph ph-handshake"></i><span>handshake</span></div>
    <div class="item"><i class="ph ph-sword"></i><span>sword</span></div>
    <div class="item"><i class="ph ph-shield"></i><span>shield</span></div>
    <div class="item"><i class="ph ph-coins"></i><span>coins</span></div>
    <div class="item"><i class="ph ph-grains"></i><span>grains</span></div>
    <div class="item"><i class="ph ph-scales"></i><span>scales</span></div>
    <div class="item"><i class="ph ph-flag"></i><span>flag</span></div>
    <div class="item"><i class="ph ph-castle-turret"></i><span>castle</span></div>
    <div class="item"><i class="ph ph-users-three"></i><span>court</span></div>
    <div class="item"><i class="ph ph-feather"></i><span>feather</span></div>
    <div class="item"><i class="ph ph-quotes"></i><span>quotes</span></div>
    <div class="item"><i class="ph ph-globe-hemisphere-east"></i><span>realm</span></div>
    <div class="item"><i class="ph ph-hourglass"></i><span>cycle</span></div>
    <div class="item"><i class="ph ph-eye"></i><span>watch</span></div>
    <div class="item"><i class="ph ph-warning-octagon"></i><span>alert</span></div>
    <div class="item"><i class="ph ph-bell-simple"></i><span>dispatch</span></div>
    <div class="item"><i class="ph ph-book-open-text"></i><span>essay</span></div>
  </div>
  <div class="meta" style="margin-top:6px">Typographic ornaments · gold-3</div>
  <div class="ornaments">✦ &nbsp; ✧ &nbsp; † &nbsp; ‡ &nbsp; § &nbsp; ⁂ &nbsp; ❦</div>
</div>
</body>
</html>
