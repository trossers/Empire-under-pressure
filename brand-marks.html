<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Brand · Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--parchment-1)}
  .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .row{display:flex;gap:24px;align-items:flex-end}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;background:var(--parchment-2);border:1px solid var(--border-1);border-radius:4px}
  .item.dark{background:var(--umber-1)}
  .item img{width:100px;height:100px}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}
  .item.dark .label{color:var(--parchment-2)}
</style>
</head>
<body>
<div class="frame">
  <div class="row">
    <div class="item"><img src="../assets/logo-mark.svg" alt=""><div class="label">Mark · primary</div></div>
    <div class="item"><img src="../assets/seal-circle.svg" alt=""><div class="label">Seal · stamp use</div></div>
    <div class="item dark"><img src="../assets/logo-mark.svg" alt=""><div class="label">Mark · on chrome</div></div>
  </div>
</div>
</body>
</html>
