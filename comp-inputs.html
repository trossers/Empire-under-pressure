<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Components · Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .lbl{font-family:var(--font-display);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-3)}
  .input{background:var(--parchment-0);border:1px solid var(--border-2);border-radius:2px;padding:10px 14px;font-family:var(--font-serif);font-size:15px;color:var(--ink-1);box-shadow:var(--shadow-sunken)}
  .input:focus{outline:0;border-color:var(--oxblood-1);box-shadow:var(--shadow-sunken),0 0 0 3px rgba(122,31,35,.12)}
  .row{display:flex;gap:12px}
  .row .field{flex:1}
  .help{font-family:var(--font-serif);font-style:italic;font-size:13px;color:var(--ink-4)}
  .err{color:var(--oxblood-1)}
  textarea.input{resize:none;min-height:64px;font-size:14px}
  select.input{appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--ink-3) 50%),linear-gradient(135deg,var(--ink-3) 50%,transparent 50%);background-position:calc(100% - 18px) center,calc(100% - 13px) center;background-size:5px 5px;background-repeat:no-repeat;padding-right:36px}
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="field"><div class="lbl">Kingdom Name</div>
      <input class="input" value="The Sovereign Realm of Calidone">
    </div>
    <div class="field"><div class="lbl">Sigil</div>
      <select class="input"><option>Crowned Stag</option></select>
    </div>
  </div>
  <div class="field"><div class="lbl">Founding Doctrine</div>
    <textarea class="input">A constitutional crown bound by the Concord of Cycle II.</textarea>
    <div class="help">120 of 280 characters. The chancellery suggests brevity.</div>
  </div>
  <div class="field"><div class="lbl err">Levy Amount</div>
    <input class="input" style="border-color:var(--oxblood-1)" value="2,400">
    <div class="help err">The Crown lacks sufficient grain to honor this levy.</div>
  </div>
</div>
</body>
</html>
