<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Components · Top Chrome</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:18px;box-sizing:border-box}
  .bar{display:flex;align-items:center;height:56px;background:var(--umber-1);color:var(--parchment-1);padding:0 18px;border-radius:2px;box-shadow:var(--shadow-2)}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold-2)}
  .brand .seal{width:24px;height:24px;border-radius:50%;background:var(--oxblood-1);display:flex;align-items:center;justify-content:center}
  .brand .seal i{color:var(--gold-2);font-size:12px}
  .center{flex:1;display:flex;justify-content:center;gap:18px;font-family:var(--font-display);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--parchment-2)}
  .center span.active{color:var(--gold-2);border-bottom:1px solid var(--gold-2);padding-bottom:4px}
  .right{display:flex;align-items:center;gap:14px}
  .cycle{font-family:var(--font-mono);font-size:11px;color:var(--gold-2);letter-spacing:.1em}
  .crest{width:32px;height:32px;border-radius:50%;background:var(--oxblood-1);border:1px solid var(--gold-2);display:flex;align-items:center;justify-content:center;color:var(--gold-2)}
</style></head>
<body>
<div class="frame">
  <div class="bar">
    <div class="brand"><span class="seal"><i class="ph ph-crown"></i></span>Empire Under Pressure</div>
    <div class="center">
      <span class="active">Realm</span>
      <span>Diplomacy</span>
      <span>Treasury</span>
      <span>War</span>
    </div>
    <div class="right">
      <span class="cycle">CYCLE XII · ⏳ 1d 04h</span>
      <i class="ph ph-bell-simple"></i>
      <div class="crest"><i class="ph ph-crown"></i></div>
    </div>
  </div>
</div>
</body>
</html>
