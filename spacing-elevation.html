<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:32px;box-sizing:border-box;background:var(--parchment-1);
  background-image: radial-gradient(ellipse at 30% 20%, rgba(168,128,74,.08), transparent 60%)}
  .row{display:flex;gap:18px}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:130px;height:90px;background:var(--parchment-2);border:1px solid var(--border-1);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-family:var(--font-display);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .input{box-shadow:var(--shadow-sunken);background:var(--parchment-0)}
  .s1{box-shadow:var(--shadow-1)}
  .s2{box-shadow:var(--shadow-2)}
  .s3{box-shadow:var(--shadow-3)}
  .seal{background:var(--oxblood-1);color:var(--parchment-1);box-shadow:var(--shadow-seal);border-color:transparent}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--ink-3);text-align:center}
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="item"><div class="box input">Input</div><div class="label">shadow-sunken</div></div>
    <div class="item"><div class="box s1">Card</div><div class="label">shadow-1 · default</div></div>
    <div class="item"><div class="box s2">Hover</div><div class="label">shadow-2 · hover</div></div>
    <div class="item"><div class="box s3">Modal</div><div class="label">shadow-3 · modal</div></div>
    <div class="item"><div class="box seal">SEAL</div><div class="label">shadow-seal</div></div>
  </div>
</div>
</body>
</html>
