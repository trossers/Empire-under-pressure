<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Components · Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .label{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;color:var(--ink-4);text-transform:uppercase;width:96px;flex-shrink:0}
  .btn{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:11px 22px;border-radius:4px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s var(--ease-imperial)}
  .btn-primary{background:var(--oxblood-1);color:var(--parchment-0);box-shadow:var(--shadow-seal)}
  .btn-primary:hover{background:#8e2529}
  .btn-secondary{background:var(--parchment-2);color:var(--ink-1);border-color:var(--border-2);box-shadow:var(--shadow-1)}
  .btn-secondary:hover{background:var(--parchment-3)}
  .btn-ghost{background:transparent;color:var(--ink-2);border-color:transparent}
  .btn-ghost:hover{background:var(--parchment-2)}
  .btn-danger-out{background:transparent;color:var(--oxblood-1);border-color:var(--oxblood-1)}
  .btn-sm{padding:7px 14px;font-size:11px}
  .btn-pressed{box-shadow:var(--shadow-sunken);background:#5c1417;color:var(--parchment-1)}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
</style></head>
<body>
<div class="frame">
  <div class="row"><div class="label">Primary</div>
    <button class="btn btn-primary"><i class="ph-bold ph-seal"></i>Seal Edict</button>
    <button class="btn btn-primary btn-pressed"><i class="ph-bold ph-seal"></i>Sealing…</button>
  </div>
  <div class="row"><div class="label">Secondary</div>
    <button class="btn btn-secondary"><i class="ph ph-scroll"></i>Draft</button>
    <button class="btn btn-secondary"><i class="ph ph-arrow-counter-clockwise"></i>Reconsider</button>
  </div>
  <div class="row"><div class="label">Ghost</div>
    <button class="btn btn-ghost">Dismiss</button>
    <button class="btn btn-ghost"><i class="ph ph-dots-three"></i></button>
  </div>
  <div class="row"><div class="label">Danger out</div>
    <button class="btn btn-danger-out"><i class="ph ph-flag"></i>Declare War</button>
  </div>
  <div class="row"><div class="label">Small</div>
    <button class="btn btn-primary btn-sm">Confirm</button>
    <button class="btn btn-secondary btn-sm">Cancel</button>
    <button class="btn btn-secondary btn-sm" disabled>Disabled</button>
  </div>
</div>
</body>
</html>
