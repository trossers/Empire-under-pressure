<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Colors · Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--parchment-1)}
  .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{aspect-ratio:1;border:1px solid var(--border-1);border-radius:4px;display:flex;align-items:flex-end;padding:8px}
  .sw .name{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.06em;color:var(--parchment-1)}
  .sw.light .name{color:var(--ink-1)}
  .meta{margin-top:14px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .meta div{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-4);text-align:center}
</style>
</head>
<body>
<div class="frame">
  <div class="grid">
    <div class="sw" style="background:#1a120a"><div class="name">ink-1</div></div>
    <div class="sw" style="background:#3a2a1a"><div class="name">ink-2</div></div>
    <div class="sw" style="background:#5a4632"><div class="name">ink-3</div></div>
    <div class="sw" style="background:#8a7458"><div class="name">ink-4</div></div>
    <div class="sw light" style="background:#b3a182"><div class="name">ink-5</div></div>
  </div>
  <div class="meta">
    <div>#1A120A</div><div>#3A2A1A</div><div>#5A4632</div><div>#8A7458</div><div>#B3A182</div>
  </div>
</div>
</body>
</html>
