<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .row{display:flex;gap:18px;align-items:flex-end;justify-content:space-around}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:72px;background:var(--parchment-2);border:1px solid var(--border-2)}
  .label{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-3);text-align:center}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--ink-4)}
</style></head>
<body>
<div class="frame">
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="label">radius-0</div><div class="px">0 · sharp</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="label">radius-1</div><div class="px">2 · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">radius-2</div><div class="px">4 · cards · default</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="label">radius-3</div><div class="px">6 · modals</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:120px;height:36px"></div><div class="label">radius-pill</div><div class="px">∞ · status chips</div></div>
    <div class="item"><div class="box" style="border-radius:50%;background:var(--oxblood-1);border-color:transparent"></div><div class="label">circle</div><div class="px">seal · GOD-MODE</div></div>
  </div>
</div>
</body>
</html>
