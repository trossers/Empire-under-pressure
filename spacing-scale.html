<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--parchment-1)} .frame{width:700px;padding:28px 32px;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
  .label{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);width:70px}
  .bar{height:14px;background:var(--oxblood-1);border-radius:1px}
  .px{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-4)}
</style></head>
<body>
<div class="frame">
  <div class="row"><div class="label">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="label">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="label">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="label">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="label">sp-5</div><div class="bar" style="width:24px"></div><div class="px">24 px · default card padding</div></div>
  <div class="row"><div class="label">sp-6</div><div class="bar" style="width:32px"></div><div class="px">32 px · section gutter</div></div>
  <div class="row"><div class="label">sp-7</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="label">sp-8</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
  <div class="row"><div class="label">sp-9</div><div class="bar" style="width:96px"></div><div class="px">96 px · hero margin</div></div>
</div>
</body>
</html>
